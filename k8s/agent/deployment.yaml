apiVersion: v1
kind: Namespace
metadata:
  name: agent-system

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-agent
  namespace: agent-system
  labels:
    app: devops-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-agent
  template:
    metadata:
      labels:
        app: devops-agent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8080"
        prometheus.io/path:   "/metrics"
    spec:
      serviceAccountName: devops-agent

      # Init container: creates the DB directory and sets ownership before
      # the agent starts. Runs as root briefly; agent runs as non-root (uid 1000).
      initContainers:
        - name: init-db
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /data/agent && chown 1000:1000 /data/agent"]
          volumeMounts:
            - name: agent-state
              mountPath: /data/agent

      containers:
        - name: agent
          image: devops-agent:latest
          imagePullPolicy: Never        # kind loads the image locally

          ports:
            - containerPort: 8080
              name: metrics

          volumeMounts:
            - name: agent-state
              mountPath: /data/agent

          env:
            # ── LLM ──────────────────────────────────────────────────────────
            - name: LLM_BACKEND
              value: "claude"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: anthropic-api-key

            # ── Observability ─────────────────────────────────────────────────
            - name: PROMETHEUS_URL
              value: "http://prometheus-operated.monitoring.svc.cluster.local:9090"
            - name: LOKI_URL
              value: "http://loki.monitoring.svc.cluster.local:3100"

            # ── Target ───────────────────────────────────────────────────────
            - name: TARGET_NAMESPACE
              value: "demo"
            - name: TARGET_DEPLOYMENT
              value: "buggy-app"

            # ── SLO thresholds ────────────────────────────────────────────────
            - name: SLO_ERROR_RATE_THRESHOLD
              value: "0.01"
            - name: SLO_4XX_RATE_THRESHOLD
              value: "0.05"
            - name: SLO_LATENCY_P99_MS
              value: "200"
            - name: SLO_LATENCY_P50_MS
              value: "50"
            - name: SLO_CPU_THRESHOLD
              value: "0.80"
            - name: SLO_CPU_THROTTLE_THRESHOLD
              value: "0.25"
            - name: SLO_MEMORY_THRESHOLD
              value: "0.85"
            - name: SLO_OOM_KILLS_THRESHOLD
              value: "0"
            - name: SLO_ACTIVE_REQUESTS_MAX
              value: "50"
            - name: SLO_CHECK_P50
              value: "false"

            # ── Agent behaviour ───────────────────────────────────────────────
            - name: AGENT_POLL_INTERVAL_SEC
              value: "10"
            - name: COOLDOWN_PERIOD_SEC
              value: "120"
            - name: VERIFY_DELAY_SEC
              value: "90"
            - name: MIN_REPLICAS
              value: "1"
            - name: MAX_REPLICAS
              value: "6"
            - name: AGENT_METRICS_PORT
              value: "8080"

            # ── Persistent state (SQLite on PVC) ──────────────────────────────
            - name: DB_PATH
              value: "/data/agent/agent.db"
            - name: INCIDENT_HISTORY_LIMIT
              value: "200"

            # ── Logging & mode ────────────────────────────────────────────────
            - name: LOG_FORMAT
              value: "json"
            - name: LOG_LEVEL
              value: "INFO"
            - name: AGENT_MODE
              value: "multiagent"

            # ── LangSmith tracing ─────────────────────────────────────────────
            # Populate agent-secrets with langsmith-api-key to enable tracing.
            # Each incident appears as a run in the LangSmith dashboard with
            # orchestrate → specialists → synthesizer as child spans.
            - name: LANGCHAIN_TRACING_V2
              value: "true"
            - name: LANGCHAIN_PROJECT
              value: "devops-agent"
            # - name: LANGSMITH_API_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: agent-secrets
            #       key: langsmith-api-key

            # ── Escalation ────────────────────────────────────────────────────
            # Uncomment and populate agent-secrets to enable Slack/HTTP alerts
            # - name: ESCALATION_WEBHOOK_URL
            #   valueFrom:
            #     secretKeyRef:
            #       name: agent-secrets
            #       key: escalation-webhook-url
            - name: ESCALATION_AFTER_FAILURES
              value: "2"

          resources:
            requests:
              cpu:    "50m"
              memory: "128Mi"
            limits:
              cpu:    "300m"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

      volumes:
        - name: agent-state
          persistentVolumeClaim:
            claimName: agent-state
