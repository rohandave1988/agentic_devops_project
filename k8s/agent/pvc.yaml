apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agent-state
  namespace: agent-system
  labels:
    app: devops-agent
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
  # Omitting storageClassName uses the cluster default:
  #   kind / local dev  → standard (hostPath)
  #   EKS               → gp2 / gp3 (EBS)
  #   GKE               → standard (pd-ssd)
  # Override with: --set storageClassName=gp3
