# kube-prometheus-stack Helm values
# Tuned for local kind cluster (reduced resource usage)

fullnameOverride: prometheus

prometheus:
  service:
    type: NodePort
    nodePort: 30090

  prometheusSpec:
    # Scrape every 15s — fast enough for demo scenarios
    scrapeInterval: "15s"
    evaluationInterval: "15s"

    retention: 12h          # Local cluster — keep 12h

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi

    # Auto-discover ServiceMonitors in all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

    additionalScrapeConfigs:
      # Directly scrape buggy-app pods via annotation discovery
      - job_name: "buggy-app-pods"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["demo"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

alertmanager:
  enabled: false      # Not needed for local demo

grafana:
  enabled: true
  adminPassword: "admin123"

  service:
    type: NodePort
    nodePort: 30300

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  # Auto-provision Loki as a datasource
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki:3100
      access: proxy
      isDefault: false

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
