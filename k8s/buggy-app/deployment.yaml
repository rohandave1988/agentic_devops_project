apiVersion: apps/v1
kind: Deployment
metadata:
  name: buggy-app
  namespace: demo
  labels:
    app: buggy-app
    version: "1.0"
  annotations:
    # Tracks current version for rollback decisions by the agent
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: buggy-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # Zero-downtime rollouts
  template:
    metadata:
      labels:
        app: buggy-app
        version: "1.0"
      annotations:
        # Promtail auto-discovers pods with this annotation
        prometheus.io/scrape: "true"
        prometheus.io/port:   "3000"
        prometheus.io/path:   "/metrics"
    spec:
      containers:
        - name: buggy-app
          image: buggy-app:latest
          imagePullPolicy: Never    # Use locally loaded kind image
          ports:
            - containerPort: 3000
              name: http

          # ── Resource limits (agent monitors these) ───────────────────────
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "2000m"
              memory: "512Mi"

          # ── Health probes ─────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 2

          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
