# Horizontal Pod Autoscaler — agent can also trigger scaling independently
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: buggy-app-hpa
  namespace: demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: buggy-app
  minReplicas: 1
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
