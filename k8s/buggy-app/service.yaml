apiVersion: v1
kind: Service
metadata:
  name: buggy-app
  namespace: demo
  labels:
    app: buggy-app
spec:
  selector:
    app: buggy-app
  ports:
    - name: http
      port: 80
      targetPort: 3000
  type: ClusterIP
---
# NodePort for local access during demos
apiVersion: v1
kind: Service
metadata:
  name: buggy-app-external
  namespace: demo
spec:
  selector:
    app: buggy-app
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30080
  type: NodePort
