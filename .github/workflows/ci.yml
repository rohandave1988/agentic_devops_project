name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  agent:
    name: Lint & Test Agent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: agent/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: pip install ruff && ruff check . --select E,F --ignore E501 || true

      - name: Test
        run: pytest tests/ -v

  buggy-app:
    name: Lint Buggy App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: buggy-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: buggy-app/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: pip install ruff && ruff check . --select E,F --ignore E501 || true

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [agent, buggy-app]
    steps:
      - uses: actions/checkout@v4

      - name: Build agent image
        run: docker build -t devops-agent:${{ github.sha }} agent/

      - name: Build buggy-app image
        run: docker build -t buggy-app:${{ github.sha }} buggy-app/
